<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In · Campaign City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="backdrop"></div>
  <main class="page center-page">
    <section class="panel auth-form-card narrow-card">
      <div class="eyebrow">Campaign City</div>
      <h2>Sign in</h2>
      <p class="subcopy">Access your workspace, previews, and protected document workflows.</p>



      <form method="post" class="stack-lg">
        <label class="field">
          <span>Username</span>
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button class="button primary full-width" type="submit">Continue</button>
      </form>
      <div class="inline-link-row">Need an account? <a href="/register">Create one</a></div>
    </section>
  </main>
</body>

</html>
