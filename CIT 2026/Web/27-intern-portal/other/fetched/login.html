<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6c63ff;
      box-shadow: 0 0 5px rgba(108, 99, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    .login-btn {
      background: #6c63ff;
      color: white;
      border: none;
    }

    .login-btn:hover {
      background: #574fd6;
    }

    .register-btn {
      background: transparent;
      color: #6c63ff;
      border: 2px solid #6c63ff;
    }

    .register-btn:hover {
      background: #6c63ff;
      color: #fff;
    }

    .divider {
      margin: 15px 0;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Welcome Back 👋</h2>

    <form method="POST">
      <div class="form-group">
        <input name="username" placeholder="Username" required>
      </div>

      <div class="form-group">
        <input name="password" type="password" placeholder="Password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="divider">or</div>

    <a href="/register">
      <button type="button" class="register-btn">Create an Account</button>
    </a>
  </div>

</body>

</html>
