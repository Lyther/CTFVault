<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .register-container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6c63ff;
      box-shadow: 0 0 5px rgba(108, 99, 255, 0.4);
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #27ae60;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }

    .footer a {
      color: #6c63ff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="register-container">
    <h2>Create Account ✨</h2>

    <form method="POST">
      <div class="form-group">
        <input name="username" placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <input name="password" type="password" placeholder="Create a password" required>
      </div>

      <button type="submit">Register</button>
    </form>

    <div class="footer">
      Already have an account?
      <a href="/login">Login</a>
    </div>
  </div>

</body>

</html>
