service ctf_coding_agent
{
    type = UNLISTED
    protocol = tcp
    socket_type = stream
    port = 31200
    wait = no
    disable = no
    user = user
    server = /usr/bin/timeout
    server_args = --foreground 60s /home/user/coding-agent
    log_on_success += USERID
    log_on_failure += USERID   
}