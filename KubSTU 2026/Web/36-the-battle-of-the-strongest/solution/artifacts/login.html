<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Система Голосования</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Animated background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>VOTING SYSTEM</h1>
                <p>Угадай количество лайков — получи флаг</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('register')">Регистрация</button>
                <button class="tab-btn" onclick="switchTab('login')">Вход</button>
            </div>

            <div id="register-form" class="auth-form active">
                <input type="text" id="reg-username" placeholder="Имя пользователя" required>
                <input type="password" id="reg-password" placeholder="Пароль" required>
                <button onclick="register()" class="btn-primary">Зарегистрироваться</button>
                <div id="reg-error" class="error-message" style="display:none"></div>
            </div>

            <div id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="Имя пользователя" required>
                <input type="password" id="login-password" placeholder="Пароль" required>
                <button onclick="login()" class="btn-primary">Войти</button>
                <div id="login-error" class="error-message" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- Music Player -->
    <div class="music-player" id="music-player">
        <div class="player-visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="player-track-info">
            <div class="player-track-name" id="track-name">Loading tracks...</div>
            <div class="player-progress" id="progress-bar" onclick="seekTrack(event)">
                <div class="player-progress-fill" id="progress-fill"></div>
            </div>
        </div>
        <div class="player-time" id="player-time">0:00 / 0:00</div>
        <div class="player-controls">
            <button class="player-btn" onclick="prevTrack()">⏮</button>
            <button class="player-btn play-btn" id="play-btn" onclick="togglePlay()">▶</button>
            <button class="player-btn" onclick="nextTrack()">⏭</button>
        </div>
        <div class="player-volume">
            <span style="color:var(--text-secondary); font-size:0.9rem;">🔊</span>
            <input type="range" min="0" max="1" step="0.05" value="0.5" oninput="setVolume(this.value)">
        </div>
    </div>

    <div id="particles-container"></div>

    <script>
        // ====== PARTICLES ======
        (function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (8 + Math.random() * 12) + 's';
                p.style.animationDelay = (Math.random() * 10) + 's';
                p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
                const colors = ['#6c5ce7','#00cec9','#fd79a8','#a29bfe','#00ff88'];
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(p);
            }
        })();

        // ====== MUSIC PLAYER ======
        let tracks = [];
        let currentTrackIndex = 0;
        let audio = new Audio();
        audio.volume = 0.5;
        let isPlaying = false;

        async function loadTracks() {
            try {
                const res = await fetch('/api/music_list');
                const data = await res.json();
                tracks = data.tracks;
                if (tracks.length > 0) {
                    loadTrack(0);
                    audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(() => {});
                }
            } catch(e) { console.error('Failed to load tracks', e); }
        }

        function loadTrack(index) {
            currentTrackIndex = index;
            const name = tracks[index];
            audio.src = '/music/' + encodeURIComponent(name);
            const displayName = name.replace(/\.mp3$/i,'').replace(/_/g,' ').replace(/-/g,' ');
            document.getElementById('track-name').textContent = displayName;
        }

        function togglePlay() {
            if (isPlaying) { audio.pause(); } else { audio.play().catch(()=>{}); }
            isPlaying = !isPlaying;
            updatePlayBtn();
        }

        function updatePlayBtn() {
            const btn = document.getElementById('play-btn');
            const viz = document.getElementById('visualizer');
            if (isPlaying) { btn.textContent = '⏸'; viz.classList.remove('paused'); }
            else { btn.textContent = '▶'; viz.classList.add('paused'); }
        }

        function nextTrack() { loadTrack((currentTrackIndex + 1) % tracks.length); if (isPlaying) audio.play().catch(()=>{}); }
        function prevTrack() { loadTrack((currentTrackIndex - 1 + tracks.length) % tracks.length); if (isPlaying) audio.play().catch(()=>{}); }
        audio.addEventListener('ended', nextTrack);

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                document.getElementById('progress-fill').style.width = ((audio.currentTime / audio.duration) * 100) + '%';
                document.getElementById('player-time').textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
            }
        });

        function formatTime(s) { return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }
        function seekTrack(e) { const r = document.getElementById('progress-bar').getBoundingClientRect(); if (audio.duration) audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration; }
        function setVolume(v) { audio.volume = parseFloat(v); }
        loadTracks();

        // ====== AUTH ======
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            if (tab === 'register') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            }
        }

        async function register() {
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('reg-error');
            if (!username || !password) { errorDiv.textContent = 'Заполните все поля'; errorDiv.style.display = 'block'; return; }
            try {
                const response = await fetch('/register', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
                const data = await response.json();
                if (response.ok) { window.location.href = '/'; }
                else { errorDiv.textContent = data.error || 'Ошибка'; errorDiv.style.display = 'block'; }
            } catch (error) { errorDiv.textContent = 'Ошибка подключения'; errorDiv.style.display = 'block'; }
        }

        async function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            if (!username || !password) { errorDiv.textContent = 'Заполните все поля'; errorDiv.style.display = 'block'; return; }
            try {
                const response = await fetch('/login_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username, password}) });
                const data = await response.json();
                if (response.ok) { window.location.href = '/'; }
                else { errorDiv.textContent = data.error || 'Неверные данные'; errorDiv.style.display = 'block'; }
            } catch (error) { errorDiv.textContent = 'Ошибка подключения'; errorDiv.style.display = 'block'; }
        }
    </script>
</body>
</html>
