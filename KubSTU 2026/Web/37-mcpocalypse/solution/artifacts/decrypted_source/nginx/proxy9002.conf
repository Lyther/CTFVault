server {
    listen 9002;
    server_name _;
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header X-Node-Secret x;
    }
    location /flag {
        default_type text/plain;
        alias /flag.txt;
    }
    location /flag2 {
        default_type text/plain;
        alias /app/flag.txt;  
    }
}
